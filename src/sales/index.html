<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>HC Daily Tracker</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}
input,select,textarea,button{font-family:inherit}
.spin{animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="root"></div>
<script>
(function(){
'use strict';

var BASE = window.location.origin + '/sales/api';
var e = React.createElement;
var useState = React.useState;
var useEffect = React.useEffect;
var useMemo = React.useMemo;
var useRef = React.useRef;
var useCallback = React.useCallback;

// API helper — talks to our Express/Supabase backend
function api(method, endpoint, data) {
  var url = BASE + endpoint;
  var opts = { method: method, headers: { 'Content-Type': 'application/json' } };
  if (data && method !== 'GET') opts.body = JSON.stringify(data);

  return fetch(url, opts)
    .then(function(res) { return res.json(); })
    .catch(function(err) {
      console.error('API Error:', err);
      return { success: false, error: err.message };
    });
}

function getToday() {
  return new Date().toISOString().split('T')[0];
}

function normalizeRole(r) {
  if (!r) return 'Sales Rep';
  var s = String(r).toLowerCase().trim();
  if (s === 'admin') return 'Admin';
  if (s.indexOf('manager') !== -1) return 'Team Manager';
  return 'Sales Rep';
}

function daysBetween(d1, d2) {
  var date1 = new Date(d1);
  var date2 = new Date(d2 || getToday());
  return Math.floor((date2 - date1) / (1000 * 60 * 60 * 24));
}

function getWeekStart() {
  var d = new Date();
  d.setDate(d.getDate() - d.getDay());
  return d.toISOString().split('T')[0];
}

function getMonthStart() {
  var d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-01';
}

function App() {
  var _dark = useState(true);
  var dark = _dark[0], setDark = _dark[1];

  var C = dark ? {
    bg: '#0d0d0d', card: '#1a1a1a', cardHover: '#222', input: '#2a2a2a',
    border: '#333', text: '#fff', textDim: '#888',
    primary: '#7B5EA7', success: '#22c55e', warning: '#f59e0b', danger: '#ef4444'
  } : {
    bg: '#f5f5f5', card: '#fff', cardHover: '#fafafa', input: '#f0f0f0',
    border: '#ddd', text: '#111', textDim: '#666',
    primary: '#7B5EA7', success: '#22c55e', warning: '#f59e0b', danger: '#ef4444'
  };

  // Auth
  var _loggedIn = useState(false);
  var loggedIn = _loggedIn[0], setLoggedIn = _loggedIn[1];
  var _authMode = useState('login');
  var authMode = _authMode[0], setAuthMode = _authMode[1];
  var _authForm = useState({ username: '', password: '', name: '' });
  var authForm = _authForm[0], setAuthForm = _authForm[1];
  var _authError = useState('');
  var authError = _authError[0], setAuthError = _authError[1];
  var _currentUser = useState(null);
  var currentUser = _currentUser[0], setCurrentUser = _currentUser[1];

  // App
  var _loading = useState(true);
  var loading = _loading[0], setLoading = _loading[1];
  var _saving = useState(false);
  var saving = _saving[0], setSaving = _saving[1];
  var _tab = useState('dashboard');
  var tab = _tab[0], setTab = _tab[1];
  var _sidebar = useState(false);
  var sidebar = _sidebar[0], setSidebar = _sidebar[1];
  var _toast = useState('');
  var toast = _toast[0], setToast = _toast[1];
  var _dashFilter = useState('today');
  var dashFilter = _dashFilter[0], setDashFilter = _dashFilter[1];

  // Data
  var _users = useState([]);
  var users = _users[0], setUsers = _users[1];
  var _teams = useState([]);
  var teams = _teams[0], setTeams = _teams[1];
  var _entries = useState([]);
  var entries = _entries[0], setEntries = _entries[1];
  var _chat = useState([]);
  var chat = _chat[0], setChat = _chat[1];
  var _goals = useState([]);
  var goals = _goals[0], setGoals = _goals[1];
  var _roofing = useState([]);
  var roofing = _roofing[0], setRoofing = _roofing[1];

  // Refs
  var chatEndRef = useRef(null);

  // Forms
  var _kpiForm = useState({ name: '', date: getToday(), doorsKnocked: '', doorConvos: '', doorAppts: '', callsMade: '', callConvos: '', callAppts: '', recruitAttempts: '', interviews: '', onboarded: '', notes: '', revenue: '' });
  var kpiForm = _kpiForm[0], setKpiForm = _kpiForm[1];

  var _roofForm = useState({ name: '', address: '', email: '', phone: '', type: 'retail', status: 'new', notes: '' });
  var roofForm = _roofForm[0], setRoofForm = _roofForm[1];

  var _myGoals = useState({ weeklyDoors: 100, weeklyCalls: 150, weeklyAppts: 20, weeklyRevenue: 5000, monthlyDoors: 400, monthlyCalls: 600, monthlyAppts: 80, monthlyRevenue: 20000 });
  var myGoals = _myGoals[0], setMyGoals = _myGoals[1];

  var _chatMsg = useState('');
  var chatMsg = _chatMsg[0], setChatMsg = _chatMsg[1];

  function showToast(msg) {
    setToast(msg);
    setTimeout(function() { setToast(''); }, 3000);
  }

  // Load all data from Supabase via our API
  var loadAllData = useCallback(function() {
    return Promise.all([
      api('GET', '/users'),
      api('GET', '/teams'),
      api('GET', '/entries'),
      api('GET', '/chat'),
      api('GET', '/goals'),
      api('GET', '/roofing')
    ]).then(function(results) {
      if (results[0].success) setUsers(results[0].data || []);
      if (results[1].success) setTeams(results[1].data || []);
      if (results[2].success) setEntries(results[2].data || []);
      if (results[3].success) setChat(results[3].data || []);
      if (results[4].success) setGoals(results[4].data || []);
      if (results[5].success) setRoofing(results[5].data || []);
      setLoading(false);
    }).catch(function() {
      setLoading(false);
    });
  }, []);

  // Initial load
  useEffect(function() {
    loadAllData();
  }, [loadAllData]);

  // Auto-refresh every 30 seconds
  useEffect(function() {
    var interval = setInterval(function() {
      loadAllData();
    }, 30000);
    return function() { clearInterval(interval); };
  }, [loadAllData]);

  // Auto-scroll chat
  useEffect(function() {
    if (chatEndRef.current) {
      chatEndRef.current.scrollIntoView({ behavior: 'smooth' });
    }
  }, [chat]);

  // Load user goals when logged in
  useEffect(function() {
    if (currentUser && goals.length > 0) {
      var myG = goals.find(function(g) { return String(g.userId) === String(currentUser.id); });
      if (myG) {
        setMyGoals({
          weeklyDoors: parseInt(myG.weeklyDoors) || 100,
          weeklyCalls: parseInt(myG.weeklyCalls) || 150,
          weeklyAppts: parseInt(myG.weeklyAppts) || 20,
          weeklyRevenue: parseInt(myG.weeklyRevenue) || 5000,
          monthlyDoors: parseInt(myG.monthlyDoors) || 400,
          monthlyCalls: parseInt(myG.monthlyCalls) || 600,
          monthlyAppts: parseInt(myG.monthlyAppts) || 80,
          monthlyRevenue: parseInt(myG.monthlyRevenue) || 20000
        });
      }
    }
  }, [currentUser, goals]);

  // Computed
  var isAdmin = currentUser && normalizeRole(currentUser.role) === 'Admin';
  var isManager = currentUser && normalizeRole(currentUser.role) === 'Team Manager';
  var myName = currentUser ? (currentUser.name || '').trim().split(' ')[0] : '';

  // Filter entries by user visibility
  var visibleEntries = useMemo(function() {
    if (!currentUser) return [];
    if (isAdmin) return entries;
    if (isManager) {
      var myTeam = teams.find(function(t) { return String(t.managerId) === String(currentUser.id); });
      if (myTeam) {
        var teamUserIds = users.filter(function(u) { return String(u.teamId) === String(myTeam.id); }).map(function(u) { return u.id; });
        return entries.filter(function(e) { return teamUserIds.indexOf(e.userId) !== -1 || e.name === myName; });
      }
    }
    return entries.filter(function(e) { return e.userId === currentUser.id || e.name === myName; });
  }, [entries, currentUser, isAdmin, isManager, teams, users, myName]);

  // Dashboard filtered entries
  var dashEntries = useMemo(function() {
    var today = getToday();
    var weekStart = getWeekStart();
    var monthStart = getMonthStart();
    return visibleEntries.filter(function(e) {
      if (dashFilter === 'today') return e.date === today;
      if (dashFilter === 'week') return e.date >= weekStart;
      if (dashFilter === 'month') return e.date >= monthStart;
      return true;
    });
  }, [visibleEntries, dashFilter]);

  // Dashboard totals
  var totals = useMemo(function() {
    var t = { dk: 0, dc: 0, da: 0, cm: 0, cc: 0, ca: 0, ra: 0, iv: 0, ob: 0, rev: 0 };
    dashEntries.forEach(function(e) {
      t.dk += parseInt(e.doorsKnocked) || 0;
      t.dc += parseInt(e.doorConvos) || 0;
      t.da += parseInt(e.doorAppts) || 0;
      t.cm += parseInt(e.callsMade) || 0;
      t.cc += parseInt(e.callConvos) || 0;
      t.ca += parseInt(e.callAppts) || 0;
      t.ra += parseInt(e.recruitAttempts) || 0;
      t.iv += parseInt(e.interviews) || 0;
      t.ob += parseInt(e.onboarded) || 0;
      t.rev += parseInt(e.revenue) || 0;
    });
    return t;
  }, [dashEntries]);

  // My weekly stats
  var myWeeklyStats = useMemo(function() {
    if (!currentUser) return { dk: 0, cm: 0, appts: 0, rev: 0 };
    var weekStart = getWeekStart();
    var myEntries = entries.filter(function(e) {
      return (e.userId === currentUser.id || e.name === myName) && e.date >= weekStart;
    });
    var stats = { dk: 0, cm: 0, appts: 0, rev: 0 };
    myEntries.forEach(function(e) {
      stats.dk += parseInt(e.doorsKnocked) || 0;
      stats.cm += parseInt(e.callsMade) || 0;
      stats.appts += (parseInt(e.doorAppts) || 0) + (parseInt(e.callAppts) || 0);
      stats.rev += parseInt(e.revenue) || 0;
    });
    return stats;
  }, [entries, currentUser, myName]);

  // My monthly stats
  var myMonthlyStats = useMemo(function() {
    if (!currentUser) return { dk: 0, cm: 0, appts: 0, rev: 0 };
    var monthStart = getMonthStart();
    var myEntries = entries.filter(function(e) {
      return (e.userId === currentUser.id || e.name === myName) && e.date >= monthStart;
    });
    var stats = { dk: 0, cm: 0, appts: 0, rev: 0 };
    myEntries.forEach(function(e) {
      stats.dk += parseInt(e.doorsKnocked) || 0;
      stats.cm += parseInt(e.callsMade) || 0;
      stats.appts += (parseInt(e.doorAppts) || 0) + (parseInt(e.callAppts) || 0);
      stats.rev += parseInt(e.revenue) || 0;
    });
    return stats;
  }, [entries, currentUser, myName]);

  // Leaderboard
  var leaderboard = useMemo(function() {
    var stats = {};
    dashEntries.forEach(function(e) {
      var n = e.name || 'Unknown';
      if (!stats[n]) stats[n] = { name: n, doors: 0, calls: 0, appts: 0, rev: 0 };
      stats[n].doors += parseInt(e.doorsKnocked) || 0;
      stats[n].calls += parseInt(e.callsMade) || 0;
      stats[n].appts += (parseInt(e.doorAppts) || 0) + (parseInt(e.callAppts) || 0);
      stats[n].rev += parseInt(e.revenue) || 0;
    });
    return Object.values(stats).sort(function(a, b) { return b.appts - a.appts; });
  }, [dashEntries]);

  // My roofing leads
  var myRoofingLeads = useMemo(function() {
    if (!currentUser) return [];
    return roofing.filter(function(l) {
      return String(l.assignedTo) === String(currentUser.id) || String(l.createdBy) === String(currentUser.id);
    });
  }, [roofing, currentUser]);

  // Stale leads
  var staleLeads = useMemo(function() {
    return roofing.filter(function(l) {
      if (l.status === 'sold' || l.status === 'closed') return false;
      var lastDate = l.lastContact || l.createdAt;
      if (!lastDate) return true;
      return daysBetween(lastDate, getToday()) >= 10;
    });
  }, [roofing]);

  var myStaleLeads = useMemo(function() {
    if (!currentUser) return [];
    return staleLeads.filter(function(l) {
      return String(l.assignedTo) === String(currentUser.id) || String(l.createdBy) === String(currentUser.id);
    });
  }, [staleLeads, currentUser]);

  // === AUTH ===

  function handleLogin() {
    if (!authForm.username.trim()) { setAuthError('Enter your username'); return; }
    if (!authForm.password) { setAuthError('Enter your password'); return; }

    var user = users.find(function(u) {
      return String(u.username || '').toLowerCase().trim() === authForm.username.toLowerCase().trim()
        && String(u.password || '').trim() === authForm.password.trim();
    });

    if (!user) { setAuthError('Invalid username or password'); return; }
    if (String(user.status || '').toLowerCase().trim() === 'inactive') { setAuthError('Account is deactivated'); return; }

    var normalizedUser = Object.assign({}, user, { role: normalizeRole(user.role) });
    setCurrentUser(normalizedUser);
    setLoggedIn(true);
    setAuthError('');
    setAuthForm({ username: '', password: '', name: '' });
    var firstName = (user.name || '').trim().split(' ')[0];
    setKpiForm(function(f) { return Object.assign({}, f, { name: firstName }); });
  }

  function handleSignup() {
    if (!authForm.username.trim() || authForm.username.trim().length < 3) { setAuthError('Username must be at least 3 characters'); return; }
    if (!authForm.name.trim()) { setAuthError('Enter your full name'); return; }
    if (!authForm.password || authForm.password.length < 6) { setAuthError('Password must be at least 6 characters'); return; }

    var exists = users.find(function(u) {
      return String(u.username || '').toLowerCase().trim() === authForm.username.toLowerCase().trim();
    });
    if (exists) { setAuthError('Username already taken'); return; }

    setSaving(true);
    var newUser = {
      id: Date.now().toString(),
      username: authForm.username.trim().toLowerCase(),
      password: authForm.password,
      name: authForm.name.trim(),
      role: 'Sales Rep',
      teamId: '',
      status: 'active'
    };

    api('POST', '/users', newUser).then(function(res) {
      setSaving(false);
      if (res.success) {
        setUsers(users.concat([newUser]));
        setCurrentUser(newUser);
        setLoggedIn(true);
        setAuthError('');
        setAuthForm({ username: '', password: '', name: '' });
        showToast('Account created!');
      } else {
        setAuthError(res.error || 'Failed to create account');
      }
    });
  }

  function handleLogout() {
    setCurrentUser(null);
    setLoggedIn(false);
    setSidebar(false);
    setTab('dashboard');
  }

  // === KPI ===

  function handleSubmitKpi() {
    var entryName = kpiForm.name || myName;
    if (!entryName) { showToast('Select a name'); return; }

    setSaving(true);
    var entry = {
      id: Date.now().toString(),
      userId: currentUser.id,
      name: entryName,
      date: kpiForm.date || getToday(),
      doorsKnocked: kpiForm.doorsKnocked || '0',
      doorConvos: kpiForm.doorConvos || '0',
      doorAppts: kpiForm.doorAppts || '0',
      callsMade: kpiForm.callsMade || '0',
      callConvos: kpiForm.callConvos || '0',
      callAppts: kpiForm.callAppts || '0',
      recruitAttempts: kpiForm.recruitAttempts || '0',
      interviews: kpiForm.interviews || '0',
      onboarded: kpiForm.onboarded || '0',
      notes: kpiForm.notes || '',
      revenue: kpiForm.revenue || '0'
    };

    api('POST', '/entries', entry).then(function(res) {
      setSaving(false);
      if (res.success) {
        setEntries(entries.concat([entry]));
        setKpiForm({ name: myName, date: getToday(), doorsKnocked: '', doorConvos: '', doorAppts: '', callsMade: '', callConvos: '', callAppts: '', recruitAttempts: '', interviews: '', onboarded: '', notes: '', revenue: '' });
        showToast('KPI logged!');
      } else {
        showToast('Failed to save');
      }
    });
  }

  function handleQuickLog(field, amount) {
    var todayEntry = entries.find(function(e) {
      return (e.userId === currentUser.id || e.name === myName) && e.date === getToday();
    });

    setSaving(true);

    if (todayEntry) {
      var updated = Object.assign({}, todayEntry);
      updated[field] = String((parseInt(todayEntry[field]) || 0) + amount);

      api('PUT', '/entries/' + updated.id, updated).then(function(res) {
        setSaving(false);
        if (res.success) {
          setEntries(entries.map(function(e) {
            return String(e.id) === String(updated.id) ? updated : e;
          }));
          showToast('+' + amount + ' added!');
        } else { showToast('Failed to save'); }
      });
    } else {
      var newEntry = {
        id: Date.now().toString(),
        userId: currentUser.id,
        name: myName,
        date: getToday(),
        doorsKnocked: '0', doorConvos: '0', doorAppts: '0',
        callsMade: '0', callConvos: '0', callAppts: '0',
        recruitAttempts: '0', interviews: '0', onboarded: '0',
        notes: '', revenue: '0'
      };
      newEntry[field] = String(amount);

      api('POST', '/entries', newEntry).then(function(res) {
        setSaving(false);
        if (res.success) {
          setEntries(entries.concat([newEntry]));
          showToast('+' + amount + ' added!');
        } else { showToast('Failed to save'); }
      });
    }
  }

  // === GOALS (FIXED: was broken with duplicate odessa key) ===

  function handleSaveGoals() {
    setSaving(true);

    var goalData = {
      id: Date.now().toString(),
      userId: currentUser.id,
      weeklyDoors: myGoals.weeklyDoors,
      weeklyCalls: myGoals.weeklyCalls,
      weeklyAppts: myGoals.weeklyAppts,
      weeklyRevenue: myGoals.weeklyRevenue,
      monthlyDoors: myGoals.monthlyDoors,
      monthlyCalls: myGoals.monthlyCalls,
      monthlyAppts: myGoals.monthlyAppts,
      monthlyRevenue: myGoals.monthlyRevenue
    };

    api('POST', '/goals', goalData).then(function(res) {
      setSaving(false);
      if (res.success) {
        // Update local state
        var existing = goals.findIndex(function(g) { return String(g.userId) === String(currentUser.id); });
        if (existing !== -1) {
          setGoals(goals.map(function(g, i) { return i === existing ? goalData : g; }));
        } else {
          setGoals(goals.concat([goalData]));
        }
        showToast('Goals saved!');
      } else { showToast('Failed to save goals'); }
    });
  }

  // === ROOFING ===

  function handleSubmitRoofLead() {
    if (!roofForm.name.trim() || !roofForm.phone.trim()) { showToast('Name and phone required'); return; }

    setSaving(true);
    var lead = {
      id: Date.now().toString(),
      name: roofForm.name.trim(),
      address: roofForm.address.trim(),
      email: roofForm.email.trim(),
      phone: roofForm.phone.trim(),
      type: roofForm.type,
      status: 'new',
      assignedTo: currentUser.id,
      assignedName: currentUser.name,
      createdBy: currentUser.id,
      createdAt: getToday(),
      lastContact: '',
      notes: roofForm.notes.trim()
    };

    api('POST', '/roofing', lead).then(function(res) {
      setSaving(false);
      if (res.success) {
        setRoofing(roofing.concat([lead]));
        setRoofForm({ name: '', address: '', email: '', phone: '', type: 'retail', status: 'new', notes: '' });
        showToast('Lead added!');
      } else { showToast('Failed to add lead'); }
    });
  }

  function handleMarkContacted(lead) {
    setSaving(true);
    var updated = Object.assign({}, lead, { lastContact: getToday(), status: lead.status === 'new' ? 'contacted' : lead.status });

    api('PUT', '/roofing/' + lead.id, updated).then(function(res) {
      setSaving(false);
      if (res.success) {
        setRoofing(roofing.map(function(l) { return String(l.id) === String(lead.id) ? updated : l; }));
        showToast('Marked as contacted!');
      }
    });
  }

  function handleUpdateLeadStatus(lead, newStatus) {
    setSaving(true);
    var updated = Object.assign({}, lead, { status: newStatus });
    api('PUT', '/roofing/' + lead.id, updated).then(function(res) {
      setSaving(false);
      if (res.success) {
        setRoofing(roofing.map(function(l) { return String(l.id) === String(lead.id) ? updated : l; }));
        showToast('Status updated!');
      }
    });
  }

  function handleDeleteLead(lead) {
    if (!confirm('Delete this lead?')) return;
    setSaving(true);
    api('DELETE', '/roofing/' + lead.id).then(function(res) {
      setSaving(false);
      if (res.success) {
        setRoofing(roofing.filter(function(l) { return String(l.id) !== String(lead.id); }));
        showToast('Lead deleted');
      }
    });
  }

  function handleAssignLead(lead, userId) {
    setSaving(true);
    var assignedUser = users.find(function(u) { return String(u.id) === String(userId); });
    var updated = Object.assign({}, lead, { assignedTo: userId, assignedName: assignedUser ? assignedUser.name : '' });
    api('PUT', '/roofing/' + lead.id, updated).then(function(res) {
      setSaving(false);
      if (res.success) {
        setRoofing(roofing.map(function(l) { return String(l.id) === String(lead.id) ? updated : l; }));
        showToast('Lead reassigned!');
      }
    });
  }

  // === CHAT ===

  function handleSendChat() {
    if (!chatMsg.trim()) return;
    setSaving(true);
    var msg = {
      id: Date.now().toString(),
      user: myName,
      text: chatMsg.trim(),
      time: new Date().toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' }),
      teamId: currentUser.teamId || ''
    };

    api('POST', '/chat', msg).then(function(res) {
      setSaving(false);
      if (res.success) {
        setChat(chat.concat([msg]));
        setChatMsg('');
      }
    });
  }

  // === ADMIN ===

  function handleUpdateUser(user, field, value) {
    setSaving(true);
    var updated = Object.assign({}, user);
    updated[field] = value;
    api('PUT', '/users/' + user.id, updated).then(function(res) {
      setSaving(false);
      if (res.success) {
        setUsers(users.map(function(u) { return String(u.id) === String(user.id) ? updated : u; }));
        showToast('User updated!');
      }
    });
  }

  function handleAddTeam() {
    var name = prompt('Enter team name:');
    if (!name || !name.trim()) return;
    setSaving(true);
    var team = { id: Date.now().toString(), name: name.trim(), managerId: '' };
    api('POST', '/teams', team).then(function(res) {
      setSaving(false);
      if (res.success) {
        setTeams(teams.concat([team]));
        showToast('Team added!');
      }
    });
  }

  function handleUpdateTeam(team, field, value) {
