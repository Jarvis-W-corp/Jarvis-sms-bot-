<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>HC Daily Tracker</title>
<link rel="manifest" href="/sales/manifest.webmanifest">
<meta name="theme-color" content="#7B5EA7">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="HC Tracker">
<link rel="apple-touch-icon" href="/sales/icon-192.png">
<script>if('serviceWorker' in navigator){window.addEventListener('load',()=>{navigator.serviceWorker.register('/sales/sw.js').catch(()=>{});});}</script>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}
input,select,textarea,button{font-family:inherit}
.spin{animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="root"></div>
<script>
(function(){
'use strict';

var BASE = window.location.origin + '/sales/api';
var e = React.createElement;
var useState = React.useState;
var useEffect = React.useEffect;
var useMemo = React.useMemo;
var useRef = React.useRef;
var useCallback = React.useCallback;

var ROOF_STAGES = [
  { value: 'new', label: 'New Lead', color: '#888' },
  { value: 'appointment_set', label: 'Appt Set', color: '#7B5EA7' },
  { value: 'claim_filed', label: 'Claim Filed', color: '#f59e0b' },
  { value: 'claim_processing', label: 'Processing', color: '#3b82f6' },
  { value: 'approved', label: 'Approved', color: '#22c55e' },
  { value: 'closed', label: 'Closed', color: '#ef4444' }
];

function stageColor(status) {
  var s = ROOF_STAGES.find(function(st) { return st.value === status; });
  return s ? s.color : '#888';
}
function stageLabel(status) {
  var s = ROOF_STAGES.find(function(st) { return st.value === status; });
  return s ? s.label : status;
}

function api(method, endpoint, data) {
  var url = BASE + endpoint;
  var opts = { method: method, headers: { 'Content-Type': 'application/json' } };
  if (data && method !== 'GET') opts.body = JSON.stringify(data);
  return fetch(url, opts)
    .then(function(res) { return res.json(); })
    .catch(function(err) { return { success: false, error: err.message }; });
}

function getToday() { return new Date().toISOString().split('T')[0]; }

function normalizeRole(r) {
  if (!r) return 'Sales Rep';
  var s = String(r).toLowerCase().trim();
  if (s === 'admin') return 'Admin';
  if (s === 'roof admin') return 'Roof Admin';
  if (s.indexOf('manager') !== -1) return 'Team Manager';
  return 'Sales Rep';
}

function daysBetween(d1, d2) {
  return Math.floor((new Date(d2 || getToday()) - new Date(d1)) / 86400000);
}
function getWeekStart() { var d = new Date(); d.setDate(d.getDate() - d.getDay()); return d.toISOString().split('T')[0]; }
function getMonthStart() { var d = new Date(); return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-01'; }

function App() {
  var _dark = useState(true); var dark = _dark[0], setDark = _dark[1];
  var C = dark ? {
    bg: '#0d0d0d', card: '#1a1a1a', input: '#2a2a2a', border: '#333', text: '#fff', textDim: '#888',
    primary: '#7B5EA7', success: '#22c55e', warning: '#f59e0b', danger: '#ef4444', info: '#3b82f6'
  } : {
    bg: '#f5f5f5', card: '#fff', input: '#f0f0f0', border: '#ddd', text: '#111', textDim: '#666',
    primary: '#7B5EA7', success: '#22c55e', warning: '#f59e0b', danger: '#ef4444', info: '#3b82f6'
  };

  // Auth
  var _loggedIn = useState(false); var loggedIn = _loggedIn[0], setLoggedIn = _loggedIn[1];
  var _authMode = useState('login'); var authMode = _authMode[0], setAuthMode = _authMode[1];
  var _authForm = useState({ username: '', password: '', name: '' }); var authForm = _authForm[0], setAuthForm = _authForm[1];
  var _authError = useState(''); var authError = _authError[0], setAuthError = _authError[1];
  var _currentUser = useState(null); var currentUser = _currentUser[0], setCurrentUser = _currentUser[1];

  // App state
  var _loading = useState(true); var loading = _loading[0], setLoading = _loading[1];
  var _saving = useState(false); var saving = _saving[0], setSaving = _saving[1];
  var _tab = useState('dashboard'); var tab = _tab[0], setTab = _tab[1];
  var _sidebar = useState(false); var sidebar = _sidebar[0], setSidebar = _sidebar[1];
  var _toast = useState(''); var toast = _toast[0], setToast = _toast[1];
  var _dashFilter = useState('today'); var dashFilter = _dashFilter[0], setDashFilter = _dashFilter[1];

  // Data
  var _users = useState([]); var users = _users[0], setUsers = _users[1];
  var _teams = useState([]); var teams = _teams[0], setTeams = _teams[1];
  var _entries = useState([]); var entries = _entries[0], setEntries = _entries[1];
  var _chat = useState([]); var chat = _chat[0], setChat = _chat[1];
  var _goals = useState([]); var goals = _goals[0], setGoals = _goals[1];
  var _roofing = useState([]); var roofing = _roofing[0], setRoofing = _roofing[1];
  var _notifications = useState([]); var notifications = _notifications[0], setNotifications = _notifications[1];

  var chatEndRef = useRef(null);

  // Forms
  var _kpiForm = useState({ name: '', date: getToday(), doorsKnocked: '', doorConvos: '', doorAppts: '', callsMade: '', callConvos: '', callAppts: '', recruitAttempts: '', interviews: '', onboarded: '', notes: '', revenue: '' });
  var kpiForm = _kpiForm[0], setKpiForm = _kpiForm[1];
  var _roofForm = useState({ name: '', address: '', email: '', phone: '', type: 'retail', notes: '' });
  var roofForm = _roofForm[0], setRoofForm = _roofForm[1];
  var _myGoals = useState({ weeklyDoors: 100, weeklyCalls: 150, weeklyAppts: 20, weeklyRevenue: 5000, monthlyDoors: 400, monthlyCalls: 600, monthlyAppts: 80, monthlyRevenue: 20000 });
  var myGoals = _myGoals[0], setMyGoals = _myGoals[1];
  var _chatMsg = useState(''); var chatMsg = _chatMsg[0], setChatMsg = _chatMsg[1];
  var _roofFilter = useState('all'); var roofFilter = _roofFilter[0], setRoofFilter = _roofFilter[1];
  // For editing a lead (Roof Admin)
  var _editLead = useState(null); var editLead = _editLead[0], setEditLead = _editLead[1];
  var _editOutcome = useState(''); var editOutcome = _editOutcome[0], setEditOutcome = _editOutcome[1];
  var _editCommission = useState(''); var editCommission = _editCommission[0], setEditCommission = _editCommission[1];
  var _editRevenue = useState(''); var editRevenue = _editRevenue[0], setEditRevenue = _editRevenue[1];

  function showToast(msg) { setToast(msg); setTimeout(function() { setToast(''); }, 3000); }

  var loadAllData = useCallback(function() {
    return Promise.all([
      api('GET', '/users'), api('GET', '/teams'), api('GET', '/entries'),
      api('GET', '/chat'), api('GET', '/goals'), api('GET', '/roofing')
    ]).then(function(r) {
      if (r[0].success) setUsers(r[0].data || []);
      if (r[1].success) setTeams(r[1].data || []);
      if (r[2].success) setEntries(r[2].data || []);
      if (r[3].success) setChat(r[3].data || []);
      if (r[4].success) setGoals(r[4].data || []);
      if (r[5].success) setRoofing(r[5].data || []);
      setLoading(false);
    }).catch(function() { setLoading(false); });
  }, []);

  function loadNotifications() {
    if (!currentUser) return;
    api('GET', '/notifications/' + currentUser.id).then(function(r) {
      if (r.success) setNotifications(r.data || []);
    });
  }

  useEffect(function() { loadAllData(); }, [loadAllData]);
  useEffect(function() { var i = setInterval(function() { loadAllData(); }, 30000); return function() { clearInterval(i); }; }, [loadAllData]);
  useEffect(function() { if (chatEndRef.current) chatEndRef.current.scrollIntoView({ behavior: 'smooth' }); }, [chat]);
  useEffect(function() { if (currentUser) loadNotifications(); }, [currentUser]);
  useEffect(function() { if (currentUser) { var i = setInterval(loadNotifications, 15000); return function() { clearInterval(i); }; } }, [currentUser]);

  useEffect(function() {
    if (currentUser && goals.length > 0) {
      var myG = goals.find(function(g) { return String(g.userId) === String(currentUser.id); });
      if (myG) setMyGoals({
        weeklyDoors: parseInt(myG.weeklyDoors) || 100, weeklyCalls: parseInt(myG.weeklyCalls) || 150,
        weeklyAppts: parseInt(myG.weeklyAppts) || 20, weeklyRevenue: parseInt(myG.weeklyRevenue) || 5000,
        monthlyDoors: parseInt(myG.monthlyDoors) || 400, monthlyCalls: parseInt(myG.monthlyCalls) || 600,
        monthlyAppts: parseInt(myG.monthlyAppts) || 80, monthlyRevenue: parseInt(myG.monthlyRevenue) || 20000
      });
    }
  }, [currentUser, goals]);

  var isAdmin = currentUser && normalizeRole(currentUser.role) === 'Admin';
  var isManager = currentUser && normalizeRole(currentUser.role) === 'Team Manager';
  var isRoofAdmin = currentUser && normalizeRole(currentUser.role) === 'Roof Admin';
  var myName = currentUser ? (currentUser.name || '').trim().split(' ')[0] : '';
  var unreadCount = notifications.filter(function(n) { return !n.read; }).length;

  var visibleEntries = useMemo(function() {
    if (!currentUser) return [];
    if (isAdmin) return entries;
    if (isManager) {
      var myTeam = teams.find(function(t) { return String(t.managerId) === String(currentUser.id); });
      if (myTeam) {
        var ids = users.filter(function(u) { return String(u.teamId) === String(myTeam.id); }).map(function(u) { return u.id; });
        return entries.filter(function(e) { return ids.indexOf(e.userId) !== -1 || e.name === myName; });
      }
    }
    return entries.filter(function(e) { return e.userId === currentUser.id || e.name === myName; });
  }, [entries, currentUser, isAdmin, isManager, teams, users, myName]);

  var dashEntries = useMemo(function() {
    var today = getToday(), ws = getWeekStart(), ms = getMonthStart();
    return visibleEntries.filter(function(e) {
      if (dashFilter === 'today') return e.date === today;
      if (dashFilter === 'week') return e.date >= ws;
      if (dashFilter === 'month') return e.date >= ms;
      return true;
    });
  }, [visibleEntries, dashFilter]);

  var totals = useMemo(function() {
    var t = { dk: 0, dc: 0, da: 0, cm: 0, cc: 0, ca: 0, ra: 0, iv: 0, ob: 0, rev: 0 };
    dashEntries.forEach(function(e) {
      t.dk += parseInt(e.doorsKnocked) || 0; t.dc += parseInt(e.doorConvos) || 0; t.da += parseInt(e.doorAppts) || 0;
      t.cm += parseInt(e.callsMade) || 0; t.cc += parseInt(e.callConvos) || 0; t.ca += parseInt(e.callAppts) || 0;
      t.ra += parseInt(e.recruitAttempts) || 0; t.iv += parseInt(e.interviews) || 0; t.ob += parseInt(e.onboarded) || 0;
      t.rev += parseInt(e.revenue) || 0;
    });
    return t;
  }, [dashEntries]);

  var myWeeklyStats = useMemo(function() {
    if (!currentUser) return { dk: 0, cm: 0, appts: 0, rev: 0 };
    var ws = getWeekStart();
    var s = { dk: 0, cm: 0, appts: 0, rev: 0 };
    entries.filter(function(e) { return (e.userId === currentUser.id || e.name === myName) && e.date >= ws; }).forEach(function(e) {
      s.dk += parseInt(e.doorsKnocked) || 0; s.cm += parseInt(e.callsMade) || 0;
      s.appts += (parseInt(e.doorAppts) || 0) + (parseInt(e.callAppts) || 0); s.rev += parseInt(e.revenue) || 0;
    });
    return s;
  }, [entries, currentUser, myName]);

  var myMonthlyStats = useMemo(function() {
    if (!currentUser) return { dk: 0, cm: 0, appts: 0, rev: 0 };
    var ms = getMonthStart();
    var s = { dk: 0, cm: 0, appts: 0, rev: 0 };
    entries.filter(function(e) { return (e.userId === currentUser.id || e.name === myName) && e.date >= ms; }).forEach(function(e) {
      s.dk += parseInt(e.doorsKnocked) || 0; s.cm += parseInt(e.callsMade) || 0;
      s.appts += (parseInt(e.doorAppts) || 0) + (parseInt(e.callAppts) || 0); s.rev += parseInt(e.revenue) || 0;
    });
    return s;
  }, [entries, currentUser, myName]);

  var leaderboard = useMemo(function() {
    var stats = {};
    dashEntries.forEach(function(e) {
      var n = e.name || 'Unknown';
      if (!stats[n]) stats[n] = { name: n, doors: 0, calls: 0, appts: 0, rev: 0 };
      stats[n].doors += parseInt(e.doorsKnocked) || 0; stats[n].calls += parseInt(e.callsMade) || 0;
      stats[n].appts += (parseInt(e.doorAppts) || 0) + (parseInt(e.callAppts) || 0); stats[n].rev += parseInt(e.revenue) || 0;
    });
    return Object.values(stats).sort(function(a, b) { return b.appts - a.appts; });
  }, [dashEntries]);

  var myRoofingLeads = useMemo(function() {
    if (!currentUser) return [];
    return roofing.filter(function(l) { return String(l.assignedTo) === String(currentUser.id) || String(l.createdBy) === String(currentUser.id); });
  }, [roofing, currentUser]);

  var staleLeads = useMemo(function() {
    return roofing.filter(function(l) {
      if (l.status === 'approved' || l.status === 'closed') return false;
      var last = l.lastContact || l.createdAt;
      return !last || daysBetween(last, getToday()) >= 10;
    });
  }, [roofing]);

  var myStaleLeads = useMemo(function() {
    if (!currentUser) return [];
    return staleLeads.filter(function(l) { return String(l.assignedTo) === String(currentUser.id) || String(l.createdBy) === String(currentUser.id); });
  }, [staleLeads, currentUser]);

  var filteredRoofing = useMemo(function() {
    var leads = (isAdmin || isRoofAdmin) ? roofing : myRoofingLeads;
    if (roofFilter === 'all') return leads;
    return leads.filter(function(l) { return l.status === roofFilter; });
  }, [roofing, myRoofingLeads, roofFilter, isAdmin, isRoofAdmin]);

  // === AUTH ===
  function handleLogin() {
    if (!authForm.username.trim()) { setAuthError('Enter your username'); return; }
    if (!authForm.password) { setAuthError('Enter your password'); return; }
    var user = users.find(function(u) {
      return String(u.username || '').toLowerCase().trim() === authForm.username.toLowerCase().trim()
        && String(u.password || '').trim() === authForm.password.trim();
    });
    if (!user) { setAuthError('Invalid username or password'); return; }
    if (String(user.status || '').toLowerCase().trim() === 'inactive') { setAuthError('Account is deactivated'); return; }
    var nu = Object.assign({}, user, { role: normalizeRole(user.role) });
    setCurrentUser(nu); setLoggedIn(true); setAuthError(''); setAuthForm({ username: '', password: '', name: '' });
    setKpiForm(function(f) { return Object.assign({}, f, { name: (user.name || '').trim().split(' ')[0] }); });
    // Set default tab based on role
    if (normalizeRole(user.role) === 'Roof Admin') setTab('roofpipeline');
  }

  function handleSignup() {
    if (!authForm.username.trim() || authForm.username.trim().length < 3) { setAuthError('Username must be at least 3 characters'); return; }
    if (!authForm.name.trim()) { setAuthError('Enter your full name'); return; }
    if (!authForm.password || authForm.password.length < 6) { setAuthError('Password must be at least 6 characters'); return; }
    if (users.find(function(u) { return String(u.username || '').toLowerCase().trim() === authForm.username.toLowerCase().trim(); })) { setAuthError('Username already taken'); return; }
    setSaving(true);
    var nu = { id: Date.now().toString(), username: authForm.username.trim().toLowerCase(), password: authForm.password, name: authForm.name.trim(), role: 'Sales Rep', teamId: '', status: 'active' };
    api('POST', '/users', nu).then(function(r) {
      setSaving(false);
      if (r.success) { setUsers(users.concat([nu])); setCurrentUser(nu); setLoggedIn(true); setAuthError(''); setAuthForm({ username: '', password: '', name: '' }); showToast('Account created!'); }
      else setAuthError(r.error || 'Failed to create account');
    });
  }

  function handleLogout() { setCurrentUser(null); setLoggedIn(false); setSidebar(false); setTab('dashboard'); setNotifications([]); }

  // === KPI ===
  function handleSubmitKpi() {
    var entryName = kpiForm.name || myName;
    if (!entryName) { showToast('Select a name'); return; }
    setSaving(true);
    var entry = { id: Date.now().toString(), userId: currentUser.id, name: entryName, date: kpiForm.date || getToday(),
      doorsKnocked: kpiForm.doorsKnocked || '0', doorConvos: kpiForm.doorConvos || '0', doorAppts: kpiForm.doorAppts || '0',
      callsMade: kpiForm.callsMade || '0', callConvos: kpiForm.callConvos || '0', callAppts: kpiForm.callAppts || '0',
      recruitAttempts: kpiForm.recruitAttempts || '0', interviews: kpiForm.interviews || '0', onboarded: kpiForm.onboarded || '0',
      notes: kpiForm.notes || '', revenue: kpiForm.revenue || '0' };
    api('POST', '/entries', entry).then(function(r) {
      setSaving(false);
      if (r.success) { setEntries(entries.concat([entry])); setKpiForm({ name: myName, date: getToday(), doorsKnocked: '', doorConvos: '', doorAppts: '', callsMade: '', callConvos: '', callAppts: '', recruitAttempts: '', interviews: '', onboarded: '', notes: '', revenue: '' }); showToast('KPI logged!'); }
      else showToast('Failed to save');
    });
  }

  function handleQuickLog(field, amount) {
    var todayEntry = entries.find(function(e) { return (e.userId === currentUser.id || e.name === myName) && e.date === getToday(); });
    setSaving(true);
    if (todayEntry) {
      var updated = Object.assign({}, todayEntry); updated[field] = String((parseInt(todayEntry[field]) || 0) + amount);
      api('PUT', '/entries/' + updated.id, updated).then(function(r) { setSaving(false); if (r.success) { setEntries(entries.map(function(e) { return String(e.id) === String(updated.id) ? updated : e; })); showToast('+' + amount + '!'); } });
    } else {
      var ne = { id: Date.now().toString(), userId: currentUser.id, name: myName, date: getToday(), doorsKnocked: '0', doorConvos: '0', doorAppts: '0', callsMade: '0', callConvos: '0', callAppts: '0', recruitAttempts: '0', interviews: '0', onboarded: '0', notes: '', revenue: '0' };
      ne[field] = String(amount);
      api('POST', '/entries', ne).then(function(r) { setSaving(false); if (r.success) { setEntries(entries.concat([ne])); showToast('+' + amount + '!'); } });
    }
  }

  // === GOALS ===
  function handleSaveGoals() {
    setSaving(true);
    var gd = { id: Date.now().toString(), userId: currentUser.id, weeklyDoors: myGoals.weeklyDoors, weeklyCalls: myGoals.weeklyCalls, weeklyAppts: myGoals.weeklyAppts, weeklyRevenue: myGoals.weeklyRevenue, monthlyDoors: myGoals.monthlyDoors, monthlyCalls: myGoals.monthlyCalls, monthlyAppts: myGoals.monthlyAppts, monthlyRevenue: myGoals.monthlyRevenue };
    api('POST', '/goals', gd).then(function(r) {
      setSaving(false);
      if (r.success) { var ei = goals.findIndex(function(g) { return String(g.userId) === String(currentUser.id); }); if (ei !== -1) setGoals(goals.map(function(g, i) { return i === ei ? gd : g; })); else setGoals(goals.concat([gd])); showToast('Goals saved!'); }
    });
  }

  // === ROOFING ===
  function handleSubmitRoofLead() {
    if (!roofForm.name.trim() || !roofForm.phone.trim()) { showToast('Name and phone required'); return; }
    setSaving(true);
    var lead = { id: Date.now().toString(), name: roofForm.name.trim(), address: roofForm.address.trim(), email: roofForm.email.trim(), phone: roofForm.phone.trim(), type: roofForm.type, status: 'new', assignedTo: currentUser.id, assignedName: currentUser.name, createdBy: currentUser.id, createdAt: getToday(), lastContact: '', notes: roofForm.notes.trim(), commission: 0, revenue: 0, outcome: '' };
    api('POST', '/roofing', lead).then(function(r) {
      setSaving(false);
      if (r.success) { setRoofing(roofing.concat([lead])); setRoofForm({ name: '', address: '', email: '', phone: '', type: 'retail', notes: '' }); showToast('Lead added!'); }
    });
  }

  function handleMarkContacted(lead) {
    setSaving(true);
    var updated = Object.assign({}, lead, { lastContact: getToday(), status: lead.status === 'new' ? 'appointment_set' : lead.status });
    api('PUT', '/roofing/' + lead.id, updated).then(function(r) {
      setSaving(false);
      if (r.success) { setRoofing(roofing.map(function(l) { return String(l.id) === String(lead.id) ? updated : l; })); showToast('Updated!'); }
    });
  }

  // Roof Admin: update lead status + send notification to rep
  function handleRoofStatusUpdate(lead, newStatus, outcome, commission, revenue) {
    setSaving(true);
    var updated = Object.assign({}, lead, { status: newStatus, lastContact: getToday() });
    if (outcome !== undefined) updated.outcome = outcome;
    if (commission !== undefined) updated.commission = commission;
    if (revenue !== undefined) updated.revenue = revenue;

    api('PUT', '/roofing/' + lead.id, updated).then(function(r) {
      if (r.success) {
        setRoofing(roofing.map(function(l) { return String(l.id) === String(lead.id) ? updated : l; }));

        // Send notification to the sales rep
        var repId = lead.createdBy || lead.assignedTo;
        if (repId) {
          var msg = 'Lead "' + lead.name + '" moved to ' + stageLabel(newStatus);
          if (outcome) msg += ' - ' + outcome;
          if (parseFloat(commission) > 0) msg += ' | Commission: $' + parseFloat(commission).toLocaleString();
          if (parseFloat(revenue) > 0) msg += ' | Revenue: $' + parseFloat(revenue).toLocaleString();
          api('POST', '/notifications', { id: Date.now().toString(), userId: repId, message: msg, leadId: lead.id });
        }
        showToast('Lead updated & rep notified!');
      }
      setSaving(false);
      setEditLead(null);
    });
  }

  function handleDeleteLead(lead) {
    if (!confirm('Delete this lead?')) return;
    setSaving(true);
    api('DELETE', '/roofing/' + lead.id).then(function(r) { setSaving(false); if (r.success) { setRoofing(roofing.filter(function(l) { return String(l.id) !== String(lead.id); })); showToast('Deleted'); } });
  }

  function handleAssignLead(lead, userId) {
    setSaving(true);
    var au = users.find(function(u) { return String(u.id) === String(userId); });
    var updated = Object.assign({}, lead, { assignedTo: userId, assignedName: au ? au.name : '' });
    api('PUT', '/roofing/' + lead.id, updated).then(function(r) { setSaving(false); if (r.success) { setRoofing(roofing.map(function(l) { return String(l.id) === String(lead.id) ? updated : l; })); showToast('Reassigned!'); } });
  }

  function handleMarkNotificationsRead() {
    if (!currentUser) return;
    api('PUT', '/notifications/read/' + currentUser.id).then(function(r) {
      if (r.success) setNotifications(notifications.map(function(n) { return Object.assign({}, n, { read: true }); }));
    });
  }

  // === CHAT ===
  function handleSendChat() {
    if (!chatMsg.trim()) return;
    setSaving(true);
